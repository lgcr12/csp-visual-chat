<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Story Bible and route system screenshot</title>
  <desc id="desc">Documentation image for character-specific Story Bible templates and route states.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10131b"/><stop offset="1" stop-color="#20283a"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/><stop offset="1" stop-color="#0b1020" stop-opacity="0.74"/></linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="80" y="82" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#fff">Character Story Bible</text>
  <text x="80" y="118" font-family="Arial, sans-serif" font-size="18" fill="#c9d3e6">每个角色获得专属正史窗口、说话方式、亲密节奏、禁止行为、个人线冲突和结局条件。</text>
  <g transform="translate(80 165)">
    <rect width="500" height="420" rx="24" fill="url(#panel)" stroke="#fff" stroke-opacity="0.16"/>
    <text x="34" y="52" font-family="Arial" font-size="24" font-weight="800" fill="#fff">模板示例：别扭靠近</text>
    <text x="34" y="96" font-family="Arial" font-size="18" fill="#d7deef">正史窗口：不改写主线身份与关系</text>
    <text x="34" y="132" font-family="Arial" font-size="18" fill="#d7deef">说话方式：嘴硬、防御、关心藏在反话里</text>
    <text x="34" y="168" font-family="Arial" font-size="18" fill="#d7deef">亲密节奏：给台阶 → 接住关心 → 触碰防御</text>
    <text x="34" y="204" font-family="Arial" font-size="18" fill="#d7deef">禁止行为：无铺垫告白、抹掉防御、泛化撒娇</text>
    <text x="34" y="260" font-family="Arial" font-size="20" font-weight="800" fill="#fff">个人线冲突</text>
    <text x="34" y="296" font-family="Arial" font-size="18" fill="#d7deef">她能否在保留自尊的同时，承认真心</text>
  </g>
  <g transform="translate(660 165)">
    <rect width="540" height="420" rx="24" fill="url(#panel)" stroke="#fff" stroke-opacity="0.16"/>
    <text x="36" y="52" font-family="Arial" font-size="24" font-weight="800" fill="#fff">Route Flow</text>
    <rect x="50" y="92" width="180" height="70" rx="18" fill="#293244" stroke="#fff" stroke-opacity="0.16"/><text x="140" y="134" text-anchor="middle" font-family="Arial" font-size="18" fill="#fff">共同线</text>
    <path d="M240 127h70" stroke="#9ebcff" stroke-width="4" stroke-linecap="round"/>
    <rect x="320" y="92" width="180" height="70" rx="18" fill="#293244" stroke="#fff" stroke-opacity="0.16"/><text x="410" y="134" text-anchor="middle" font-family="Arial" font-size="18" fill="#fff">个人线</text>
    <path d="M410 172v66" stroke="#9ebcff" stroke-width="4" stroke-linecap="round"/>
    <rect x="320" y="250" width="180" height="70" rx="18" fill="#293244" stroke="#fff" stroke-opacity="0.16"/><text x="410" y="292" text-anchor="middle" font-family="Arial" font-size="18" fill="#fff">结局态</text>
    <text x="50" y="370" font-family="Arial" font-size="18" fill="#d7deef">条件菜单依赖 flags、memories、关系温度和路线阶段。</text>
  </g>
</svg>
