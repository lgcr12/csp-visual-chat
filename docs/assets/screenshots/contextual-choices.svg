<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Contextual choices screenshot</title>
  <desc id="desc">Central translucent route choices generated from the assistant reply content.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0c1220"/><stop offset="1" stop-color="#1f2535"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#111827" stop-opacity="0.62"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="420" y="60" width="430" height="360" rx="22" fill="#10233f" opacity="0.38"/>
  <text x="640" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#f8fbff">选项由回复内容生成</text>
  <text x="640" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#bfc9dc">示例回复：实验数据又错了，她很烦躁。</text>
  <g transform="translate(315 190)" filter="url(#shadow)">
    <g><rect width="650" height="82" rx="20" fill="url(#card)" stroke="#fff" stroke-opacity="0.18"/><circle cx="46" cy="41" r="18" fill="#293244" stroke="#fff" stroke-opacity="0.34"/><text x="46" y="47" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">1</text><text x="92" y="36" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#fff">先问是哪一组实验数据出了问题</text><text x="92" y="62" font-family="Arial, sans-serif" font-size="14" fill="#c8d2e4">认真作答 · 贴合实验语境</text></g>
    <g transform="translate(0 106)"><rect width="650" height="82" rx="20" fill="url(#card)" stroke="#fff" stroke-opacity="0.18"/><circle cx="46" cy="41" r="18" fill="#293244" stroke="#fff" stroke-opacity="0.34"/><text x="46" y="47" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">2</text><text x="92" y="36" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#fff">陪她从误差来源开始复盘</text><text x="92" y="62" font-family="Arial, sans-serif" font-size="14" fill="#c8d2e4">谨慎观察 · 降低张力</text></g>
    <g transform="translate(0 212)"><rect width="650" height="82" rx="20" fill="url(#card)" stroke="#fff" stroke-opacity="0.18"/><circle cx="46" cy="41" r="18" fill="#293244" stroke="#fff" stroke-opacity="0.34"/><text x="46" y="47" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">3</text><text x="92" y="36" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#fff">先接住她的烦躁，但不否定判断</text><text x="92" y="62" font-family="Arial, sans-serif" font-size="14" fill="#c8d2e4">认真安慰 · 不强推关系</text></g>
  </g>
</svg>
